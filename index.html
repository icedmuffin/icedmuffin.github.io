
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rack Survey (Mobile Optimized)</title>
  <link rel="stylesheet" href="styles.css">
  <!-- html2pdf (bundled with html2canvas + jsPDF) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js">
  // ===== Multi-U fill (tap once, apply to next row) =====
  let lastValue = "";

  document.addEventListener("input", (e) => {
    if (e.target.tagName === "TEXTAREA") {
      lastValue = e.target.value;
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "TEXTAREA" && e.key === "Enter") {
      e.preventDefault();

      const currentRow = e.target.closest("tr");
      const nextRow = currentRow.nextElementSibling;

      if (nextRow) {
        const nextTextarea = nextRow.querySelector("textarea");
        nextTextarea.value = e.target.value;
        nextTextarea.focus();
      }
    }
  });

</script>
</head>
<body>

<div class="container">
  <h1>Rack Survey</h1>

  <div class="form-section">
    <input id="site" type="text" placeholder="Data Center Site">
    <input id="rack" type="text" placeholder="Rack Number">
    <input id="date" type="date">
  </div>

  <div class="actions">
    <button id="exportBtn">Export PDF</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>U</th>
        <th>Device</th>
        <th>U</th>
      </tr>
    </thead>
    <tbody id="rack-body"></tbody>
  </table>

  <div class="hint">Scroll ↓ • Tap to type • Supports long device names</div>
  <div class="footer">Optimized for mobile survey (Samsung A32)</div>
</div>

<!-- Hidden print area (used only for PDF) -->
<div id="print-area" style="display:none"></div>

<script>
  const tbody = document.getElementById("rack-body");

  for (let i = 42; i >= 1; i--) {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td class="u-number">${i}</td>
      <td><textarea placeholder="e.g. Akamai-WAF-1"></textarea></td>
      <td class="u-number">${i}</td>
    `;

    tbody.appendChild(row);
  }

  // ===== Export to PDF (only filled rows) =====
  document.getElementById("exportBtn").addEventListener("click", () => {
    const site = document.getElementById("site").value || "-";
    const rack = document.getElementById("rack").value || "-";
    const date = document.getElementById("date").value || "-";

    const rows = document.querySelectorAll("#rack-body tr");

    let content = `
      <h2>Rack Survey Report</h2>
      <p><strong>Site:</strong> ${site}</p>
      <p><strong>Rack:</strong> ${rack}</p>
      <p><strong>Date:</strong> ${date}</p>
      <table border="1" cellspacing="0" cellpadding="6" style="width:100%; border-collapse: collapse;">
        <tr>
          <th>U</th>
          <th>Device</th>
          <th>U</th>
        </tr>
    `;

    rows.forEach(row => {
      const u = row.children[0].innerText;
      const device = row.querySelector("textarea").value.trim();

      if (device !== "") {
        content += `
          <tr>
            <td>${u}</td>
            <td>${device}</td>
            <td>${u}</td>
          </tr>
        `;
      }
    });

    content += "</table>";

    const printArea = document.getElementById("print-area");
    printArea.innerHTML = content;
    printArea.style.display = "block";

    const opt = {
      margin: 0.3,
      filename: `rack-survey-${rack}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(printArea).save().then(() => {
      printArea.style.display = "none";
    });
  });
</script>

</body>
</html>
